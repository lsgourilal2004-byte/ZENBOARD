{% extends 'tasks/base.html' %}

{% block title %}{{ action }} Task - ZenBoard{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md border-t-4 border-purple-600">
        <h2 class="text-2xl font-bold text-purple-700 mb-6 text-center">
            {% if action == 'Edit' %}✏️ Edit Task{% else %}✅ New Task{% endif %}
        </h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Task Title</label>
                <input type="text" name="title" value="{{ task.title }}"
                    class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500"
                    required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Description</label>
                <textarea name="description" rows="3"
                    class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500">{{ task.description }}</textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Project</label>
                <select name="project" class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500">
                    {% for project in projects %}
                        <option value="{{ project.id }}" {% if task.project.id == project.id %}selected{% endif %}>
                            {{ project.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Status</label>
                <select name="status" class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500">
                    <option value="todo" {% if task.status == 'todo' %}selected{% endif %}>To Do</option>
                    <option value="inprogress" {% if task.status == 'inprogress' %}selected{% endif %}>In Progress</option>
                    <option value="done" {% if task.status == 'done' %}selected{% endif %}>Done</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Priority</label>
                <select name="priority" class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500">
                    <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
                    <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
                    <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Deadline</label>
                <input type="date" name="deadline" value="{{ task.deadline }}"
                    class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-full font-semibold hover:bg-purple-700 transition mt-2">
                {{ action }} Task
            </button>
            <a href="{% url 'task_list' %}" class="block text-center text-gray-500 mt-3 hover:text-purple-600">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
