{% extends 'tasks/base.html' %}

{% block title %}Delete Task - ZenBoard{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md border-t-4 border-red-500">
        <h2 class="text-2xl font-bold text-red-600 mb-4 text-center">🗑️ Delete Task</h2>
        <p class="text-gray-600 text-center mb-6">
            Are you sure you want to delete <span class="font-bold text-purple-700">{{ task.title }}</span>?
        </p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-500 text-white py-2 rounded-full font-semibold hover:bg-red-600 transition mb-3">
                Yes, Delete
            </button>
            <a href="{% url 'task_list' %}" class="block text-center text-gray-500 hover:text-purple-600">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
