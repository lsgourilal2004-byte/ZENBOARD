<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-purple-700 text-white px-6 py-4 flex items-center justify-between shadow-lg">
        <h1 class="text-2xl font-bold tracking-wide">⚡ ZenBoard</h1>
        <div class="flex items-center gap-6">
            <a href="{% url 'dashboard' %}" class="hover:text-purple-200 transition font-medium">Dashboard</a>
            <a href="{% url 'project_list' %}" class="hover:text-purple-200 transition font-medium">Projects</a>
            <a href="{% url 'task_list' %}" class="hover:text-purple-200 transition font-medium">Tasks</a>
            {% if user.is_authenticated %}
                <span class="text-purple-200 text-sm">Hi, {{ user.username }} 👋</span>
                <a href="{% url 'logout' %}" class="bg-white text-purple-700 px-4 py-1 rounded-full font-semibold hover:bg-purple-100 transition">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="bg-white text-purple-700 px-4 py-1 rounded-full font-semibold hover:bg-purple-100 transition">Login</a>
            {% endif %}
        </div>
    </nav>

    <!-- Content -->
    <div class="max-w-5xl mx-auto mt-10 px-4">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
