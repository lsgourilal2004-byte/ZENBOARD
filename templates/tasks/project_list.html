{% extends 'tasks/base.html' %}

{% block title %}Projects - ZenBoard{% endblock %}

{% block content %}

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-purple-700">📁 Projects</h2>
        <a href="{% url 'project_create' %}" class="bg-purple-600 text-white px-4 py-2 rounded-full font-semibold hover:bg-purple-700 transition">
            + New Project
        </a>
    </div>

    <!-- Project List -->
    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-purple-500">
        {% for project in projects %}
            <div class="border-b border-gray-100 py-4 flex justify-between items-center">
                <div>
                    <p class="font-semibold text-gray-700 text-lg">{{ project.name }}</p>
                    <p class="text-gray-500 text-sm">{{ project.description }}</p>
                </div>
                <div class="flex gap-2">
                    <a href="{% url 'project_edit' project.id %}" class="bg-yellow-400 text-white px-3 py-1 rounded-full text-sm hover:bg-yellow-500 transition">Edit</a>
                    <a href="{% url 'project_delete' project.id %}" class="bg-red-500 text-white px-3 py-1 rounded-full text-sm hover:bg-red-600 transition">Delete</a>
                </div>
            </div>
        {% empty %}
            <p class="text-gray-400">No projects yet. Create one!</p>
        {% endfor %}
    </div>

{% endblock %}
