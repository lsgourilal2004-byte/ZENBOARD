{% extends 'tasks/base.html' %}

{% block title %}Projects - ZenBoard{% endblock %}

{% block content %}

    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-xl font-bold text-gray-700 mb-4">All Projects</h2>
        {% for project in projects %}
            <div class="border-b py-3">
                <p class="font-semibold text-gray-700">{{ project.name }}</p>
                <p class="text-gray-500 text-sm">{{ project.description }}</p>
            </div>
        {% empty %}
            <p class="text-gray-400">No projects yet</p>
        {% endfor %}
    </div>

{% endblock %}
