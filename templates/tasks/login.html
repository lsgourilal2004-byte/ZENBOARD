{% extends 'tasks/base.html' %}

{% block title %}Login - ZenBoard{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md border-t-4 border-purple-600">
        <h2 class="text-2xl font-bold text-purple-700 mb-6 text-center">👋 Welcome Back</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-600 font-medium mb-1">{{ field.label }}</label>
                    <div class="w-full border border-purple-200 rounded-lg px-3 py-2 focus-within:border-purple-500">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-full font-semibold hover:bg-purple-700 transition mt-2">
                Login
            </button>
        </form>
        <p class="text-center text-gray-500 mt-4">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-purple-600 font-semibold hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
