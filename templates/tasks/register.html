{% extends 'tasks/base.html' %}

{% block title %}Register - ZenBoard{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-screen">
    <div class="bg-white rounded-lg shadow p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-700 mb-6 text-center">Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-600 font-medium mb-1">{{ field.label }}</label>
                    <div class="w-full border border-gray-300 rounded px-3 py-2">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 font-semibold mt-2">
                Register
            </button>
        </form>
        <p class="text-center text-gray-500 mt-4">
            Already have an account? 
            <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Login</a>
        </p>
    </div>
</div>
{% endblock %}
