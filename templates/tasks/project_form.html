{% extends 'tasks/base.html' %}

{% block title %}{{ action }} Project - ZenBoard{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md border-t-4 border-purple-600">
        <h2 class="text-2xl font-bold text-purple-700 mb-6 text-center">
            {% if action == 'Edit' %}✏️ Edit Project{% else %}📁 New Project{% endif %}
        </h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Project Name</label>
                <input type="text" name="name" value="{{ project.name }}"
                    class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500"
                    required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 font-medium mb-1">Description</label>
                <textarea name="description" rows="3"
                    class="w-full border border-purple-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-500">{{ project.description }}</textarea>
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-full font-semibold hover:bg-purple-700 transition mt-2">
                {{ action }} Project
            </button>
            <a href="{% url 'project_list' %}" class="block text-center text-gray-500 mt-3 hover:text-purple-600">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
